services:
  server:
    environment:
      SPRING_THYMELEAF_PREFIX: file:/server-templates/
    volumes:
      - ${IDENRYA_CONFORMANCE_DIR}/templates/:/server-templates/:ro

  oidcc-provider:
    image: idenrya-oidcc-provider:local
    build:
      context: ${IDENRYA_CONFORMANCE_DIR}
      dockerfile: Dockerfile.oidcc-provider
    environment:
      ASPNETCORE_ENVIRONMENT: Conformance
      ASPNETCORE_URLS: https://+:3000
      Kestrel__Certificates__Default__Path: /https/oidcc-provider.pfx
      Kestrel__Certificates__Default__Password: oidcc-provider
    volumes:
      - ${IDENRYA_CERT_PATH}:/https/oidcc-provider.pfx:ro
      - idenrya-data:/data
    ports:
      - "3000:3000"
    entrypoint:
      - dotnet
      - Idenrya.Server.dll
    command: []
    depends_on:
      - mongodb

volumes:
  idenrya-data:
